# research/blocklist.yaml
# Hosts whose URLs are dropped from researcher output before ingestion.
# Matching is suffix-based on a dot boundary after stripping leading "www."
# (so linkedin.com matches www.linkedin.com AND uk.linkedin.com, but NOT notlinkedin.com).
# Hosts are lowercased. Operators can edit this file freely; a missing file
# is treated as an empty blocklist.
hosts:
  - host: linkedin.com
    reason: "403s on anonymous fetch"
  - host: wsj.com
    reason: "paywall"
  - host: ft.com
    reason: "paywall"
  - host: bloomberg.com
    reason: "paywall / bot wall"
  - host: nytimes.com
    reason: "metered paywall"
  - host: economist.com
    reason: "paywall"
  - host: hbr.org
    reason: "Harvard Business Review paywall"
  # PR wire services: republish entity press releases verbatim. Treating these
  # as independent sources is the proxy's main failure mode (see
  # docs/architecture/source-quality.md § Known failure mode). Hard-drop here.
  - host: prnewswire.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  - host: businesswire.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  - host: globenewswire.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  - host: accesswire.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  - host: prweb.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  - host: einpresswire.com
    reason: "PR wire: republishes entity press releases without independent analysis"
  # Candidates to review later: medium.com (intermittent), reuters.com (geo-gated)
