  planner_rationale: The three sub‑questions together cover (1) GreenPT’s own sustainability
    communications, (2) external verification or reporting, and (3) the concrete technical
    and quantitative aspects of its claimed environmental contributions. The seven
    short Brave‑compatible queries are distributed across these axes to retrieve relevant
    evidence while respecting the query length constraints.
  candidates_seen: 53
  urls_kept: 22
  urls_dropped: 25
  scorer_rationale: Candidates were scored against the three sub‑questions using only
    titles and snippets. Primary sources from GreenPT (official docs, website, blog,
    about page, sustainability pages) received high scores for sq1 (official statements)
    and sq3 (technical infrastructure) and were kept. Secondary third‑party news or
    analysis pieces that discuss GreenPT’s environmental impact were kept for sq2
    (independent assessment) and often also for sq3 when they describe the infrastructure.
    Forum and purely social‑media posts without substantive claims scored ≤2 and were
    dropped. The Apple App Store link and the Substack article were explicitly listed
    in the ‘Avoid results about’ set and were therefore dropped regardless of content.
    All remaining URLs either scored ≥3 on at least one sub‑question or were required
    to be listed as dropped.
  urls_after_blocklist: 18
