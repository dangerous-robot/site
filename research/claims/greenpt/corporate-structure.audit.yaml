  scorer_rationale: '### Scoring Rationale:


    **Kept Candidates:**

    1. **GreenPT Official Pages**: Pages like `https://greenpt.com/government/`, `https://greenpt.com/b-corp/`,
    `https://greenpt.com/sustainability/`, and `https://greenpt.com/` are directly
    tied to the entity itself and focus on **corporate claims (sq1, e.g., B Corp status,
    mission, sustainability)**. The `sq1` tag is assigned due to explicit claims on
    these pages (e.g., "B Corp AI chat", "empowers B Corps"). Other URLs are not dropped
    due to their relevance to **direct first-party evidence about GreenPT’s corporate
    structure**, even if not explicitly labeled.


    2. **Third-party reviews or partnerships (e.g., `https://www.capterra.com/p/10041361/GreenPT/`)**
    are partially relevant for **external confirmation of ownership claims (sq1)**.
    Capterra’s profile includes clear labels about ownership publicly (no explicit
    investor/parent labels, but contextual relevance to mission-based platforms).


    3. **sq3 (Regulatory/Operational Obligations)**: URLs explicitly discussing **EU
    AI Act, GDPR, and GRC obligations** (e.g., `林://www.orrick.com/en/Insights/2024/09/The-EU-AI-Act-Application-to-Open-Source-Projects`,
    `https://huggingface.co/blog/eu-ai-act-for-oss-developers`) are included because
    they illuminate **regulatory pressures** shaping corporate governance obligations
    relevant to companies like GreenPT. These are coded under sq3.


    4. **Publisher Quality Tiebreak**: Primary sources (`greenpt.com`) override secondary
    assessment; forum or tertiary sources (e.g., Substack) are dropped for all scoring
    categories.


    **Dropped Candidates:**

    1. **Off-topic or irrelevant snippets** (e.g., `https://thegreenlegalok.com/privacy-policy`,
    GreenLegal, PLLC; Green Legal Group; Wikipedia’s Privacy Policy) lack direct relevance
    to **GreenPT’s specific structure**. Singleton privacy policies from unrelated
    entities (or EU/GDPR general discussions) lack focus.


    2. **Camillapang.substack.com**: Dropped as an **excluded topic**. Tertiary or
    advocate site entries (e.g., `sq1` level-> forum opinions) are also excluded post-scoring.


    3. **General green/tech blogs**: Despite tangents (e.g., `https://www.computerweekly.com/blog/Green-Tech/`),
    snippets fail to relate to **GreenPT’s ownership regime**. Contextual overlap
    on "green tech" is insufficient with no mention of corporate structure or reflexivity.


    ### Justifications for **Dropped**:

    - **No clear mention of GreenPT ownership models** (sq2): Academic/regulatory
    sources either lacked specificity to GreenPT or reflected **broader industry insights**
    without direct echoes of ownership.

    - **sq4 (Operational Partners)**: Critical details on hosting or **parent-adjacency
    disclosures** are absent. Github links only list software-focused efforts unrelated
    to corporate governance.


    ### Outcome:**

    Primary foci are **sq1 (direct claims) and sq3 (regulatory shape)**, with all
    other sub-questions inadequately covered.'
