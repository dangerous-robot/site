    2. **Third-party ESG databases** (e.g., [Global Reporting Initiative (GRI)](https://www.globalreporting.org/),
    [Sustainalytics](https://www.sustainalytics.com/esg-data), [World Bank ESG DataBank](https://databank.worldbank.org/)):
    These are critical for **sq2**, as they aggregate ESG reporting data from organizations
