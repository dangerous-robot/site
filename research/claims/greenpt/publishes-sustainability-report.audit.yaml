  scorer_rationale: Candidates were scored against the four sub‑questions. Primary‑source
    pages on the greenpt.com domain or its official subdomains that directly present
    sustainability information or a report received high scores for sq1 (e.g., /sustainability/
    and /b-corp/). Blog posts, LinkedIn updates, news articles and podcast episodes
    that announce or discuss a GreenPT sustainability/ESG report were scored ≥3 for
    sq3. Third‑party ESG databases did not list GreenPT specifically, so those results
    scored low. All entries that scored <3 on every sub‑question were placed in the
    dropped list, including irrelevant entities, forum content, and the explicitly
    avoided apps.apple.com and camillapang.substack.com URLs.
