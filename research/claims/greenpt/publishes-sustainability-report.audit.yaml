    - **Avoid Rules**: Excluded any discussion of **account.greenpt.ai**, **apps.apple.com**,
    or **camillapang.substack.com** (irrelevant topics).


    **Final Kept/Dropped Split**: Optimized for **actionable evidence** about GreenPT’s
