    ---


    ### Key Filters Applied:


    - **Entity Disambiguation**: Dropped non-GreenPT websites (e.g., hosting providers)
    even if their content tangentially matched sub-questions.

    - **Publisher Quality Tiebreaker**: Primary sources (GreenPT.com) were preferred
    over secondary/tertiary for sq1/sq3. Only **canonical** third-party ESG databases
