  scorer_rationale: "- **`sq1` (Environmental Initiatives/Commitments by Brave Software):**\
    \ Several candidates were retained due to their relevance to Brave Software's\
    \ **first-party environmental commitments or self-reported sustainability initiatives**.\
    \ These include discussions about ecological footprints, carbon savings, sustainability\
    \ strategies, or partnerships. Specifically:\n  - **Community discussions** (e.g.,\
    \ [ecological footprint thread](https://community.brave.app/t/ecological-footprint/404963),\
    \ [Sustainability Report 2023](https://bravefoundation.org.au/wp-content/uploads/2024/02/Impact-Report-2023-web.pdf))\
    \ directly address Brave’s own commitments or comparisons with similar companies.\
    \ \n  - **Green Media partnership announcements** (e.g., [BRAVE green media](https://www.thebrave.io/green-media/))\
    \ and **sustainability reports** align with Brave’s official branding or strategy.\n\
    \  - **Instagram teaser for a 2023 Sustainability Report** ([Instagram link](https://www.instagram.com/p/C6GOlBYN8mZ/))\
    \ was scored high for potentially detailing first-party claims.\n  - **Brave’s\
    \ own podcast and blog posts** (e.g., [AMA with Kindhumans](https://brave.com/blog/guest-ama-with-kindhumans/),\
    \ [podcast on environmental stewardship](https://brave.com/podcast/e26/)) mention\
    \ environmental themes or collaborations, though some lack direct substance.\n\
    \n  Dismissed items either focused on unrelated **third-party organizations**\
    \ (e.g., OTB Group, PNNL, ARPA-H) or were entirely off-topic (e.g., Wikipedia,\
    \ software engineering papers).\n\n- **`sq2` (Third-Party ESG Ratings or Audits):**\
    \ No candidates directly assessed **third-party evaluations, audits, or ESG ratings**\
    \ for Brave Software itself. Most high-quality candidates centered on **first-party\
    \ or non-standardized claims**, not formal third-party certifications, filings,\
    \ or ratings.\n\n- **`sq3` (Technical Strategies for Environmental Impact):**\
    \ Candidates with actionable technical details—such as **energy-saving features\
    \ in Brave’s browser**, ad-blocking as a CO2-saving tool ([CO2 footprint thread](https://community.brave.app/t/co2-footprint-in-dashboard-through-adblocking-xg-co2-saving-sustainability/102283)),\
    \ and **forums discussing energy efficiency** (e.g., [Reddit](https://www.reddit.com/r/BATProject/comments/o0mja9/why_brave_is_esg_favorable_and_why_this_matters/))—were\
    \ retained. Direct links to Brave’s **Energy Saver documentation** were also considered\
    \ technically relevant, whileirrelevant discussions (e.g., biopreparedness programs,\
    \ unrelated 'BRAVE' acronyms, or software engineering papers) were dropped.\n\n\
    -%BAED Practice:\n  ---> Where **ambiguity** existed (e.g., broad mentions of\
    \ sustainability without specifics), lower scores (3-4) avoided overinflation,\
    \ while **clearly irrelevant** drives (e.g., software engineering, unrelated projects)\
    \ were dismissed as `1`. \n  ---> Adherence to the `secondary` label did not dismiss\
    \ results *per se*; tightened criteria ensured focus on real-world Brave initiatives,\
    \ excluding related omnibus claims (e.g., generic ESG software demo pages)."
