  scorer_rationale: 'The scoring process prioritized relevance to Brave Software''s
    ESG or sustainability claims while adhering to the instructions to avoid wikipedia.org,
    play.google.com, and apps.apple.com sources. **Kept Candidates:**   1. **sq1 (Official
    Website Addressing ESG):**   - Candidates like `https://brave.com/about/` and
    `https://brave.com/transparency/` were retained due to their alignment with Brave''s
    official site and potential coverage of sustainability topics. Both were unlikely
    to address ESG directly in their snippets but were trusted due to Brave''s domain
    authority.   2. **sq2 (Third-Party Aggregators):**   - `https://blog.bravegen.com/annual-sustainability-report-fy21-22`
    and `https://blog.bravegen.com/tag/esg` were kept because the BraveGen tag specifically
    references ESG. `https://rebalanceproject.org/events/launch-of-the-rebalance-brave-database-on-corporate-human-rights-and-environmental-abuses/`
    discusses environmental and corporate abuses related to Brave, highlighting ESG
    documentation efforts.   3. **sq3 (Press Releases, Blog Posts, News):**   - Sites
    like `https://brave.com/blog/100m-mau/`, `https://brave.com/blog/eprivacy-letter-to-eu/`,
    and presssuch as `https://www.prnewswire.com/news-releases/brave-launches-next-generation-browser-that-puts-users-in-charge-of-their-internet-experience-with-unmatched-privacy-and-rewards-300957360`
    are business updates, discussions of sustainability as a business priority, and
    other high-level mentions of ethical practices.   **Dropped Candidates:**   -
    **Non-ESG topics/irrelevance**: Most were security reports, Reddit threads not
    focused on ESG, unrelated arXiv papers on sustainability in non-Brave domains,
    or wikipedia-esque information under different entity names (e.g., `https://brav.com/responsibility/esg-in-brav`
    is excluded due to being a distinct entity despite surface similarities).   -
    **Forum posts**: Reddit candidates (`https://www.reddit.com/r/browsers/comments/19ax9ig/do_you_trust-the-company-behind-brave`
    and `https://www.reddit.com/r/BATProject/comments/o0mja9/why_brave_is_esg_favorable_and_why_this_matters/`)
    were dropped perPublisherQuality guidelines, except when no fewer biased sources
    were available.   - **Misleading Noise**: Links like `https://www.lexisnexis.com/community/insights/legal/.../brave-new-world-five-tips-for-starting-an-esg-strategy`
    were excluded since they broadly discuss ESG strategies without clearly addressing
    Brave Software’s specific practices.'
