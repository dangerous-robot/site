  planner_rationale: The four sub‑questions together capture the full scope of the
    claim—OpenAI’s own announced initiatives, direct financial support, internal sustainability
    reporting, and third‑party ESG assessment. Seven concise Brave queries are distributed
    across these questions to retrieve relevant evidence while respecting the format
    constraints.
  candidates_seen: 53
  urls_kept: 24
  urls_dropped: 29
  scorer_rationale: Each candidate was examined against the four sub‑questions using
    only the title and snippet. Scores ≥ 3 (direct or clearly relevant evidence) led
    to retention. Primary sources (OpenAI’s own sites, developer community, Trust
    portal) were favoured for operational metrics (sq3) and announced programs (sq1,
    sq2). Secondary ESG/ratings sites (Coretics, BrandScore, BrandImpact, DitchCarbon,
    Illuminem) received high scores for independent sustainability assessments (sq4).
    News articles that explicitly mention OpenAI’s $50 M fund, $40.5 M grant round,
    or other financial support to nonprofits were kept for sq2. All other URLs either
    lacked any mention of OpenAI’s environmental actions, were about unrelated entities,
    or were low‑quality forums, and therefore were dropped.
  urls_after_blocklist: 22
