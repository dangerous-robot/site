  planner_rationale: These queries aim to directly find OpenAI's official sustainability
    or ESG reports. They also explore related terms like environmental impact and
    corporate social responsibility to capture information that might not be explicitly
    labeled as a 'report.' The queries vary by using different keywords to cover a
    range of possible report titles and focuses.
  candidates_seen: 27
  urls_kept: 15
  urls_dropped: 8
  scorer_rationale: The candidates are scored based on their relevance to the claim
    that OpenAI publishes a sustainability or ESG report. Candidates with titles and
    snippets mentioning sustainability, ESG, emissions, carbon footprint, environmental
    impact, and reports are given higher scores.  Candidates from primary sources
    like OpenAI's own sites, news articles, and direct reports receive the highest
    scores. Candidates mentioning OpenAI's structure changes, particularly the transition
    to a Public Benefit Corporation, are considered relevant because it ties to their
    mission and potential for reporting.  Candidates discussing the broader environmental
    impact of AI are less directly relevant but may provide context.  Candidates with
    lower scores are either tangentially related, focus on other aspects of OpenAI,
    or lack specific mentions of sustainability reporting.
