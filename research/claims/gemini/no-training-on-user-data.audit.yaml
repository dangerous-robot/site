  scorer_rationale: "The scoring for candidates was conducted as follows:\n\n1. **Sphere\
    \ Disambiguation**: Gemini is explicitly aligned with the `https://gemini.google.com/app`\
    \ domain (Google’s cloud or consumer AI tools). Candidates referencing `gemini.com`,\
    \ `deepmind.google`, or `dogemini.app` were excluded.\n\n2. **sq1: Official Statements\
    \ on Data Usage**\n   - **5 or 4**: Google’s first-party resources (e.g., support\
    \ pages, documentation) were scored highest where they explicitly address Gemini’s\
    \ user data usage (e.g., `https://support.google.com/gemini/answer/13594961?hl=en`,\
    \ `https://cloud.google.com/gemini-enterprise/faq`). The Enterprise FAQ stood\
    \ out as unambiguous about *not* using customer data for training.\n   - **Primary\
    \ sources prioritized**; weaker claims or indirect references did not meet level\
    \ 5.\n\n3. **sq2: Third-Party Audits/ESG Reports**\n   - **1STM Index report**\
    \ (`https://crfm.stanford.edu/fmti/December-2025/company-reports/Google_FinalReport_FMTI2025.html`)\
    \ directly evaluates Gemini’s data governance.\n   - No high-quality third-party\
    \ critiques met the bar, all Junks: tertiary or secondary`.\n\n4. **sq3: Training\
    \ Pipeline Documentation**\n   - Training pipeline pages (e.g., `https://docs.cloud.google.com/gemini-enterprise-agent-platform/...`)\
    \ largely describe technical workflows for loggers or custom tuning; none address\
    \ **consumer/user** data explicitly, leaving bulk as level 3 or discarded.\n\n\
    5. **sq4: Controversies/Investigations**\n   - **Ars Technica/`PCMag`** (`https://arstechnica.com/...`,\
    \ `https://www.pcmag.com/...`) contextualize privacy concerns (e.g., indirect\
    \ mentions of PII). Forum posts (e.g., `Google Groups`) were irrevelant.\n   -\
    \ **Redact and Cape** addressed API/data terms clearly.\n\n6. **Exclusions/Drops**\n\
    \   - Technical pipeline manuals (e.g., Vertex Ai, `Gemini Enterprise Agent Platform`)\
    \ do not substantiate *user* data claims (sq1/sq4). \n   - Publisher tiers 3/`forum`\
    \ (Reddit: Irene posts, Quora) and answers limited in context: dropped.\n"
  urls_after_blocklist: 15
