  planner_rationale: The sub‑questions together address (1) Google’s own published
    commitments, (2) external partnerships that signal contribution, (3) tangible
    research and funding activities, and (4) independent ESG/AI safety evaluations.
    The seven concise Brave‑compatible queries are distributed across these axes to
    retrieve evidence for each sub‑question while avoiding prohibited sites.
  candidates_seen: 61
  urls_kept: 37
  urls_dropped: 22
  scorer_rationale: Sources that directly come from Google domains (ai.google, publicpolicy.google,
    safety.google, cloud.google.com, developers.google.com, research.google, labs.google)
    provide first‑party statements, reports, and descriptions of AI safety programmes
    – these satisfy sub‑question sq1 and often also sq3.  Partnership announcements
    from LinkedIn, DeepMind blog, X, university press releases, and news stories about
    the U.S. AI Safety consortium give third‑party recognitions of Google’s contributions,
    covering sq2.  Grant and award announcements, research team pages, and published
    papers (Concrete Problems in AI Safety, DeepMind safety blog, AI for Privacy programme,
    etc.) give concrete projects and funding information for sq3.  Independent ESG
    evaluations (FastCompany, S&P Global, Mashinii scorecard, Future of Life Institute
    AI Safety Index, BrandScore, ScienceDirect review) supply external assessments
    for sq4.  All URLs listed in the *dropped* section either discuss unrelated ad‑safety
    reports, are from avoided domains (blog.google, en.wikipedia.org), are low‑quality
    forum or news pieces without primary evidence, or score below 3 on every sub‑question,
    so they are excluded.
