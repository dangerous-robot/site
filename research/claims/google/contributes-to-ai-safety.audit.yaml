sub_questions:
- id: sq1
  question: What official statements or reports does Google publish about its AI safety
    initiatives?
  rationale: Covers first‑party sources such as sustainability pages, responsible
    AI blogs, and published safety reports.
  queries:
  - '"Google AI safety report" 2023'
  - '"Google responsible AI principles"'
  citations:
  - 2023/ai-principles-2023-progress-updatepdf
  - 2026/safety
  - 2023/adssafetyreport2023pdf
  - 2025/airesponsibilityandcsaeenpdf
  - 2026/principles
  - 2026/responsible-ai
  - 2025/intro-responsible-ai
- id: sq2
  question: Which external organizations or partnerships list Google as a contributor
    to AI safety research?
  rationale: Looks at third‑party recognitions, consortium memberships, and partnership
    announcements.
  queries:
  - Google partnership AI safety research
  - Google AI safety consortium members
  citations:
  - 2026/safety
  - 2026/responsible-ai
- id: sq3
  question: What specific AI safety projects, papers, or grants has Google funded
    or conducted?
  rationale: Identifies concrete actions—research outputs, grant programs, and open‑source
    tools.
  queries:
  - Google funded AI safety projects
  - Google AI safety research papers
  citations:
  - 2026/ai-for-privacy-safety-and-security
- id: sq4
  question: How do independent ESG or responsible‑AI assessments rate Google’s contributions
    to AI safety?
  rationale: Provides external evaluation of the claim via ESG ratings, audit reports,
    or model‑card repositories.
  queries:
  - Google ESG AI safety rating
  citations: []
