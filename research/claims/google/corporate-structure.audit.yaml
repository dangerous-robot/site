  scorer_rationale: The claim concerns Google’s corporate form. Sub‑questions 1‑3
    require sources that describe Google’s place within Alphabet, confirm that Alphabet
    is a publicly‑traded holding company, and state that Google itself is a private
    subsidiary. Stock‑market sites (Investing.com, NYSE, Yahoo, Nasdaq, Robinhood,
    Public.com, Morningstar, CNBC, CNN) explicitly show Alphabet’s ticker and exchange,
    so they answer sq2 (publicly‑traded) with primary‑source‑like data; they receive
    a score of 5 for sq2 and are kept. Ownership‑explanation articles (Untaylored,
    CompaniesHistory, BloggerAsk, RevenueMemo, Capital.com, Quantumrun) detail the
    2015 restructuring, the subsidiary relationship, and the public‑trading status
    of Alphabet, thus scoring ≥5 for sq1, sq3 and also ≥4 for sq2; they are kept with
    all three sub‑question addresses. Encyclopaedic entry (Britannica) and commercial
    company‑profile services (GlobalData, CompanyData, MarketScreener, Fintel, Alphabet
    IR site) summarise the corporate structure and public‑trading status, meeting
    the ≥3 threshold for sq1 and sq2. Wikipedia results are excluded per the "Avoid
    results about" list and are scored 1. All pages about Google for Nonprofits describe
    a program for external NGOs, not Google’s legal status, so they do not address
    sq4 and are dropped. All B‑Corp resources are generic and do not mention Google,
    so they receive a score of 1 and are dropped. Forum‑type Q&A (Quora, Reddit) are
    either low‑quality or redundant given higher‑quality sources and receive ≤2, thus
    dropped. The final kept set contains every source that can provide evidence for
    at least one sub‑question, while every other URL is listed under "dropped".
