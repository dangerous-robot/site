  planner_rationale: The sub‑questions cover (1) existence of a report, (2) its hosting
    location, (3) the most recent publication year, and (4) independent ESG confirmations.
    The seven short Brave‑compatible queries are distributed to retrieve evidence
    for each facet while respecting the no‑site‑operator rule and limiting quoted
    phrases to a single proper‑noun phrase per query.
  candidates_seen: 47
  urls_kept: 12
  urls_dropped: 35
  scorer_rationale: Primary Google sustainability pages (2024, 2025, 2023 reports
    and their PDFs) directly confirm that Google publishes official ESG/sustainability
    reports, provide the location to download them, and indicate the report year,
    thus scoring 5‑4 on sq1‑sq3. The generic "Stories and reports" page, while less
    specific, still mentions reports and therefore meets the threshold for sq1. ResponsibilityReports.com
    hosts Google’s ESG reports and supplies the same information, earning high scores
    despite being secondary. All other results either live on avoided domains (blog.google),
    are forum‑type discussions, focus on unrelated topics (AI playbook, corporate
    policy, product pages), or are generic ESG‑rating provider pages that do not explicitly
    list Google, so they score <3 on every sub‑question and are dropped.
  urls_after_blocklist: 12
