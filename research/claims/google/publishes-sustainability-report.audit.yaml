  scorer_rationale: The scoring process assessed each candidate's relevance to the
    three sub-questions related to Google's sustainability or ESG reports, adhering
    to strict publisher quality labels and entity disambiguation rules. **For sq1
    (official sustainability reports on Google's channels)**, candidates linking directly
    to Google's official domains (.google, .com docs, or regulated filings) with explicit
    mentions of reports or sustainability were prioritized. Examples include **sustainability.google**,
    direct links to **PDF reports**, and **Google Store sustainability pages**. Forum
    or blog-linked candidates lacking direct report references or purely promotional
    content (e.g., Google Cloud blogs without report links) were dropped for sq1.
    **For sq2 (third-party ESG databases)**, only candidates explicitly analyzing
    Google/Alphabet in an ESG context were retained, like ESG databases featuring
    Google or Alphabet's ESG ratings or SEC disclosures referencing sustainability
    reports. Other ESG aggregator problem set links were dropped for targeting broader
    topics. **For sq3 (stated goals/commitments in regulatory frameworks like GRI
    or SASB)**, Google's **public sustainability pages**, filing references to frameworks,
    and **direct GRI/SASBoverleden** were kept, while forum-level ESG articles targeting
    frameworks broadly were dropped. Notably, direct links to **GRI, SASB, TCFD descriptions**
    were retained for addressing framework relevance, despite being generic. **Publisher
    quality** ensured primary sources dominated sq3 scores, while secondary sources
    were harmonized with clear Google/Alphabet links for sq2. Candidates about other
    organizations or generic ESG discussions were dropped. Some overlapping scores
    (e.g., `sustainability.google`) naturally spanned multiple sub-questions due to
    comprehensive content.
  entity_exclude_dropped:
  - https://blog.google/outreach-initiatives/sustainability/report-ai-sustainability-google-cop28/
  - https://blog.google/outreach-initiatives/sustainability/2024-environmental-report/
  urls_after_blocklist: 20
