research:
  mode: decomposed
  tool_outcomes: []
  queries:
  - Google sustainability report
  - Google environmental initiatives
  - Google green energy projects
  - Google CDP climate score
  - Google ESG rating
  - Google sustainability ranking
  - Google renewable energy purchases
  planner_rationale: These queries are concise (3‑7 words), avoid prohibited operators,
    and target the three key axes needed to evaluate the claim that Google contributes
    to environmental causes.
  candidates_seen: 52
  urls_kept: 30
  urls_dropped: 20
  scorer_rationale: Primary‑source pages on sustainability.google, cloud.google.com,
    datacenters.google, and related Google‑owned domains directly describe Google's
    own environmental initiatives (sq1) and report concrete metrics such as renewable‑energy
    purchases, emissions reductions, water replenishment, etc. (sq3), so they receive
    scores ≥5 for those sub‑questions and are kept. Independent ESG and rating sites
    (Ethos ESG, Fast Company, CSRHub, KnowESG, S&P Global, Morningstar, BrandScore,
    SustainabilityOnline) provide third‑party assessments of Google's environmental
    performance, satisfying sq2 and are therefore kept. Articles about specific actions
    (SolarPowerWorld, ESG Today, Renewable Institute, Energy‑Storage.News, Investors.com)
    contain measurable outcomes, meeting sq3. Blog.google URLs are explicitly avoided
    per the "Avoid results about" list and are given a score of 1 across all sub‑questions,
    resulting in their removal. Forum and generic CDP methodology pages lack the required
    specificity or primary/independent evidence and score below 3 on all sub‑questions,
    so they are dropped.
  urls_after_blocklist: 30
sub_questions:
- id: sq1
  question: What environmental initiatives and sustainability programs does Google
    publish about on its own platforms?
  rationale: First‑party sources (reports, blogs, press releases) are the primary
    evidence of Google’s claimed contributions.
  queries:
  - Google sustainability report
  - Google environmental initiatives
  - Google green energy projects
  citations:
  - 2025/google-2025-environmental-report
  - 2026/stories
  - 2026/operations
  - 2026/google-sustainability-index
  - 2024/google-2024-environmental-report
  - 2026/sustainability
- id: sq2
  question: How do independent third‑party ESG and climate rating organizations assess
    Google’s environmental performance?
  rationale: External assessments (CDP, ESG ratings, sustainability indexes) provide
    objective validation or critique of Google’s contributions.
  queries:
  - Google CDP climate score
  - Google ESG rating
  - Google sustainability ranking
  citations: []
- id: sq3
  question: What concrete, measurable actions (e.g., renewable‑energy procurement,
    carbon‑free energy targets) has Google achieved?
  rationale: Quantitative outcomes illustrate the real impact of Google’s environmental
    efforts.
  queries:
  - Google renewable energy purchases
  citations:
  - 2025/google-2025-environmental-report
  - 2026/stories
  - 2026/operations
  - 2026/google-sustainability-index
  - 2024/google-2024-environmental-report
  - 2026/sustainability
