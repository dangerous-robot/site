  scorer_rationale: '### **Scoring Rationale**


    ***sq1*** targets **ChatGPT’s official privacy policy and direct statements from
    OpenAI** regarding data usage for training. Candidates dropped for this question
    were most often from **different publishers** or **provisional forums** (e.g.,
    Reddit) or were advocacy-focused without primary evidence.


    - **Score 5**: Items like `openai.com/consumer-privacy/`, `help.openai.com/en/articles/...`,
    and `openai.com/policies/...` directly state that ChatGPT does *not* use personal
    data for training unless explicitly opted-in, earning the highest score.


    - **Score 4**: Secondary sources (e.g., `medium.com`, `secureprivacy.ai`) that
    **paraphrase or align with OpenAI’s official stance** were retained.


    - **Dropped**: Threads on Reddit and advocacy sites (e.g., `ayodesk.com`) lacked
    citable, specific claims despite tangential discussion, as did **non-policy-specific
    technical explanations**. Context in `nordvpn` was too vague to qualify.



    ***sq2*** requires **third-party reports or investigations** validating/refuting
    the claim through independent analysis, not self-reported statements (e.g., Reuters,
    The Star reports investigating OpenAI practices for regulatory compliance).


    - **Score 5**: None, but `thestar.com` and `reuters.com` are investigative, providing
    structured findings about ChatGPT’s practices, thus retained.


    - **Dropped**: Most news/blogs came from opinion or advocacy lenses (e.g., `digit.in`,
    `medium.com` personalities repeating hearsay). Academic/research pieces (e.g.,
    `pmc.ncbi.nlm.nih.gov`) were unrelated or contradictory in scope.



    ***sq3*** assesses **technical architecture or data storage pipelines**. Irrelevant
    sites (e.g., `techradar`, shallow forums) were dropped; those providing either
    **granular details on encryption, pipelines, or storage** (e.g., OpenAI’s internal
    help docs, `secureprivacy.ai`) or **empirical evidence** score ≥4.


    - **Score 5**: `help.openai.com/8798634`, `secureprivacy.ai` (detailed technical
    exclusion criteria for business users).


    - ***Different entity rule***: Scrapped all OpenAI-branded domains per business
    tier context.



    ### **Non-Score Decisions**

    - **Entity Disambiguation**: Rejected candidates about unrelated entities (e.g.,
    Apple App Store integrations). Titles/snippets mentioning conversation opt-outs
    (e.g., `monolith.law`) were deemed advocacy or unrelated to core technical practices.

    - **Exclusion List**: All `openai.com` candidates would fail **sq3** (technical
    references to ChatGPT’s architecture—yet `app-api-docs` sites fortified scores).
    **No candidates linked to Apple/Google Play were retained** as they fall outside
    the ChatGPT entity boundary.

    '
